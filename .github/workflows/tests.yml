name: Tests & Coverage

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test-and-coverage:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Node.js (for frontend tests)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Install frontend dependencies
        working-directory: vue-app
        run: |
          npm ci || npm install

      - name: Generate coverage report
        run: python generate_coverage.py

      - name: Commit coverage.json if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f static/test-coverage.json
          if git diff --cached --quiet; then
            echo "No changes to coverage.json"
          else
            git commit -m "chore: auto-update test coverage report [skip ci]"
            git push
          fi
