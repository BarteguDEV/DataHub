# ============================================================================
# DataHub — GitHub Actions Deploy to Azure App Service
#
# Wymagane secrets (GitHub → Settings → Secrets → Actions):
#   AZURE_WEBAPP_NAME        — nazwa App Service w Azure
#   AZURE_WEBAPP_PUBLISH_PROFILE — profil publikacji z Azure Portal
# ============================================================================

name: Deploy to Azure App Service

on:
  push:
    branches: [main, master]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: vue-app/package-lock.json

      - name: Build Vue frontend
        run: |
          cd vue-app
          npm ci
          npm run build

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: .
