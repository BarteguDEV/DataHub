{% extends "base.html" %}
{% block title %}Logowanie — DataHub{% endblock %}
{% block content %}
<div class="card" style="max-width: 420px; margin: 2rem auto;">
    <h1 class="text-center">Zaloguj się</h1>
    <form method="POST">
        <div class="form-group">
            <label for="username">Nazwa użytkownika</label>
            <input type="text" id="username" name="username" placeholder="np. admin" required autofocus>
        </div>
        <div class="form-group">
            <label for="password">Hasło</label>
            <input type="password" id="password" name="password" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%">Zaloguj</button>
    </form>
    <p class="text-center mt-1">
        Nie masz konta? <a href="{{ url_for('register') }}">Zarejestruj się</a>
    </p>
</div>
{% endblock %}
