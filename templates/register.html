{% extends "base.html" %}
{% block title %}Rejestracja — DataHub{% endblock %}
{% block content %}
<div class="card" style="max-width: 420px; margin: 2rem auto;">
    <h1 class="text-center">Rejestracja</h1>
    <form method="POST">
        <div class="form-group">
            <label for="username">Nazwa użytkownika</label>
            <input type="text" id="username" name="username" placeholder="np. jan.kowalski" required autofocus>
        </div>
        <div class="form-group">
            <label for="password">Hasło</label>
            <input type="password" id="password" name="password" placeholder="••••••••" required>
        </div>
        <div class="form-group">
            <label for="confirm">Potwierdź hasło</label>
            <input type="password" id="confirm" name="confirm" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%">Utwórz konto</button>
    </form>
    <p class="text-center mt-1">
        Masz już konto? <a href="{{ url_for('login') }}">Zaloguj się</a>
    </p>
</div>
{% endblock %}
